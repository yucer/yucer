name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2.0.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true
          path: profile/stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2.0.1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true
          path: profile/stats/top-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats/github-stats.svg profile/stats/top-languages.svg

          if git diff --cached --quiet; then
            echo "No stats changes to commit."
            exit 0
          fi

          git commit -m "Update GitHub stats SVGs"
          git push
